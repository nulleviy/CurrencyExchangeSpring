services:
  postgres:
    image: postgres:15-alpine
    container_name: currencyexchange-postgres
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5252:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d exchange"]
      interval: 10s
      timeout: 5s
volumes:
  postgres_data:
